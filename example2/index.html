<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Floating Island VR Experience</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- Super Hands (for grabbing objects) -->
  <script src="https://unpkg.com/super-hands@3.0.4/dist/super-hands.min.js"></script>

  <!-- Teleport Controls -->
  <script src="https://unpkg.com/aframe-teleport-controls/dist/aframe-teleport-controls.min.js"></script>
</head>

<body>
  <a-scene
    shadow="type: pcfsoft"
    renderer="colorManagement: true"
    fog="type: exponential; color: #cceeff; density: 0.03"
  >

    <!-- Sky -->
    <a-sky color="#88ccee"></a-sky>

    <!-- Lighting -->
    <a-light type="ambient" intensity="0.5"></a-light>
    <a-light type="directional" position="5 10 5" intensity="1" castShadow="true"></a-light>

    <!-- Ground Terrain (Foreground Layer) -->
    <a-circle
      rotation="-90 0 0"
      radius="15"
      color="#3d8f3d"
      shadow="receive: true"
    ></a-circle>

    <!-- Floating Island (Midground) -->
    <a-cylinder
      position="0 1 -5"
      radius="2"
      height="0.5"
      color="#4CAF50"
      shadow="cast: true; receive: true"
    ></a-cylinder>

    <a-cone
      position="0 0.2 -5"
      radius-bottom="1.5"
      radius-top="0.3"
      height="1.2"
      color="#777777"
    ></a-cone>

    <!-- Tree -->
    <a-cylinder
      position="0 2 -5"
      radius="0.2"
      height="2"
      color="#8B4513"
    ></a-cylinder>

    <a-sphere
      position="0 3.3 -5"
      radius="0.8"
      color="#2E8B57"
    ></a-sphere>

    <!-- Grabbable Orb -->
    <a-sphere
      id="orb"
      position="1 3 -5"
      radius="0.4"
      color="#FFD700"
      class="grabbable"
      dynamic-body
      grabbable
      shadow="cast: true"
    ></a-sphere>

    <!-- Camera Rig -->
    <a-entity id="rig" position="0 0 5">

      <!-- Camera -->
      <a-camera position="0 1.6 0"></a-camera>

      <!-- Left Hand -->
      <a-entity
        laser-controls="hand: left"
        raycaster="objects: .grabbable"
        super-hands
        teleport-controls="cameraRig: #rig; teleportOrigin: #rig; collisionEntities: a-circle"
      ></a-entity>

      <!-- Right Hand -->
      <a-entity
        laser-controls="hand: right"
        raycaster="objects: .grabbable"
        super-hands
        teleport-controls="cameraRig: #rig; teleportOrigin: #rig; collisionEntities: a-circle"
      ></a-entity>

    </a-entity>

  </a-scene>
</body>
</html>
