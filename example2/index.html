<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Floating Island VR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>

<body>
  <a-scene background="color: #88ccee">

    <!-- Sky -->
    <a-sky color="#88ccee"></a-sky>

    <!-- Lighting -->
    <a-light type="ambient" intensity="0.6"></a-light>
    <a-light type="directional" position="5 10 5" intensity="1"></a-light>

    <!-- Ground -->
    <a-circle 
      rotation="-90 0 0"
      radius="15"
      color="#3d8f3d">
    </a-circle>

    <!-- Floating Island -->
    <a-cylinder
      position="0 1 -5"
      radius="2"
      height="0.5"
      color="#4CAF50">
    </a-cylinder>

    <a-cone
      position="0 0.2 -5"
      radius-bottom="1.5"
      radius-top="0.3"
      height="1.2"
      color="#777777">
    </a-cone>

    <!-- Tree -->
    <a-cylinder
      position="0 2 -5"
      radius="0.2"
      height="2"
      color="#8B4513">
    </a-cylinder>

    <a-sphere
      position="0 3.3 -5"
      radius="0.8"
      color="#2E8B57">
    </a-sphere>

    <!-- Interactive Orb -->
    <a-sphere
      id="orb"
      position="1 3 -5"
      radius="0.4"
      color="#FFD700"
      animation__hover="property: position; to: 1 3.4 -5; dir: alternate; loop: true; dur: 1500"
      event-set__enter="_event: mouseenter; color: #FF0000"
      event-set__leave="_event: mouseleave; color: #FFD700">
    </a-sphere>

    <!-- Camera Rig -->
    <a-entity id="rig" position="0 0 5">

      <a-camera position="0 1.6 0">
        <a-cursor></a-cursor>
      </a-camera>

      <!-- VR Controllers -->
      <a-entity laser-controls="hand: left"></a-entity>
      <a-entity laser-controls="hand: right"></a-entity>

    </a-entity>

  </a-scene>
</body>
</html>
