<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Floating Island VR Enhanced</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>

<body>
  <a-scene background="color: #87CEEB">

    <!-- Lighting -->
    <a-light type="ambient" intensity="0.6"></a-light>
    <a-light type="directional" position="5 10 5" intensity="1"></a-light>

    <!-- Ground -->
    <a-plane 
      rotation="-90 0 0"
      width="40"
      height="40"
      color="#3d8f3d">
    </a-plane>

    <!-- Floating Island -->
    <a-cylinder
      position="0 1 -5"
      radius="2"
      height="0.5"
      color="#4CAF50">
    </a-cylinder>

    <a-cone
      position="0 0.2 -5"
      radius-bottom="1.5"
      radius-top="0.3"
      height="1.2"
      color="#777777">
    </a-cone>

    <!-- Tree -->
    <a-cylinder
      position="0 2 -5"
      radius="0.2"
      height="2"
      color="#8B4513">
    </a-cylinder>

    <a-sphere
      position="0 3.3 -5"
      radius="0.8"
      color="#2E8B57">
    </a-sphere>

    <!-- Animated Orb -->
    <a-sphere
      position="1 3 -5"
      radius="0.4"
      color="#FFD700"
      animation="property: position; to: 1 3.5 -5; dir: alternate; loop: true; dur: 1500">
    </a-sphere>

    <!-- ========================= -->
    <!-- SKY OBJECTS (REAL GLB)   -->
    <!-- ========================= -->

    <!-- Damaged Helmet -->
    <a-entity
      gltf-model="https://rawcdn.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb"
      position="-8 8 -25"
      scale="3 3 3"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 60000">
    </a-entity>

    <!-- Cesium Man -->
    <a-entity
      gltf-model="https://rawcdn.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/CesiumMan/glTF-Binary/CesiumMan.glb"
      position="10 6 -30"
      scale="2 2 2"
      animation="property: rotation; to: 0 -360 0; loop: true; dur: 50000">
    </a-entity>

    <!-- BoomBox -->
    <a-entity
      gltf-model="https://rawcdn.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/BoomBox/glTF-Binary/BoomBox.glb"
      position="0 10 -35"
      scale="20 20 20"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 80000">
    </a-entity>

    <!-- Avocado -->
    <a-entity
      gltf-model="https://rawcdn.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/Avocado/glTF-Binary/Avocado.glb"
      position="-12 5 -28"
      scale="30 30 30"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 70000">
    </a-entity>

    <!-- Camera Rig -->
    <a-entity position="0 0 5">
      <a-camera position="0 1.6 0">
        <a-cursor></a-cursor>
      </a-camera>

      <a-entity laser-controls="hand: left"></a-entity>
      <a-entity laser-controls="hand: right"></a-entity>
    </a-entity>

  </a-scene>
</body>
</html>
